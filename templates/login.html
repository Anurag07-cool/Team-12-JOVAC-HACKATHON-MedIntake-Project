<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedIntake | Staff Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 50: '#F8FAFC', 900: '#0F172A' } },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-white font-sans h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <!-- Premium Dark Mode Background Effects -->
    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-blue-600 rounded-full mix-blend-screen filter blur-[120px] opacity-20 transform translate-x-1/3 -translate-y-1/3 pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-[800px] h-[800px] bg-emerald-600 rounded-full mix-blend-screen filter blur-[150px] opacity-20 transform -translate-x-1/4 translate-y-1/4 pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-md px-6">
        
        <div class="bg-white/10 backdrop-blur-2xl border border-white/20 p-10 rounded-3xl shadow-2xl opacity-0 animate-fade-in-up">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-6 shadow-inner border border-white/10 animate-pulse-slow">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Staff Access</h1>
                <p class="text-slate-400 text-sm">Enter your 4-digit security PIN to access the Clinician Triage Hub.</p>
            </div>
            
            {% if error %}
            <div class="bg-rose-500/20 border border-rose-500/50 text-rose-200 p-3 rounded-lg text-sm text-center mb-6">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-6" onsubmit="handleLoginSubmit(event)">
                <div>
                    <input type="password" name="pin" placeholder="••••" required maxlength="4" class="w-full bg-white/5 border border-white/10 text-white text-center text-4xl tracking-[1em] px-4 py-4 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-inner placeholder-white/20 font-mono">
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-white font-semibold py-4 rounded-xl hover:bg-emerald-400 transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_30px_rgba(16,185,129,0.5)] transform active:scale-[0.98]">
                    Authenticate
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <a href="/" class="text-sm text-slate-400 hover:text-white transition-colors">← Return to Portal Selection</a>
            </div>
        </div>
    </div>
    
    <!-- Transition Overlay -->
    <div id="transition-overlay" class="fixed inset-0 z-[100] bg-slate-900 transform translate-y-full transition-transform duration-500 ease-in-out pointer-events-none"></div>

    <script>
        function handleLoginSubmit(event) {
            // Prevent immediate form submission
            event.preventDefault();
            const form = event.target;
            const overlay = document.getElementById('transition-overlay');
            
            // Trigger animation
            requestAnimationFrame(() => {
                overlay.classList.remove('translate-y-full');
                overlay.classList.add('translate-y-0');
            });
            
            // Submit form after transition finishes
            setTimeout(() => {
                form.submit();
            }, 500);
        }
    </script>
</body>
</html>
